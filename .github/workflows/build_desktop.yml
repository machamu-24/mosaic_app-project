name: build-desktop

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: Build (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            artifact_suffix: windows-x64
          - os: macos-latest
            artifact_suffix: macos

    runs-on: ${{ matrix.os }}

    env:
      APP_NAME: MosaicApp
      PYTHON_VERSION: "3.11"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements_build.txt

      - name: Build desktop app (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          streamlit-desktop-app build app.py --name $env:APP_NAME `
            --streamlit-options --theme.base=dark `
            --pyinstaller-options --noconfirm --onedir --add-data "models;models" --hidden-import run_mosaic --hidden-import ultralytics --hidden-import requests --collect-all ultralytics --collect-all moviepy --collect-all imageio --collect-all imageio_ffmpeg

      - name: Build desktop app (macOS)
        if: runner.os == 'macOS'
        run: |
          streamlit-desktop-app build app.py --name "${APP_NAME}" \
            --streamlit-options --theme.base=dark \
            --pyinstaller-options --noconfirm --onedir --windowed --add-data "models:models" --hidden-import run_mosaic --hidden-import ultralytics --hidden-import requests --collect-all ultralytics --collect-all moviepy --collect-all imageio --collect-all imageio_ffmpeg

      - name: Resolve macOS package path
        if: runner.os == 'macOS'
        shell: bash
        run: |
          if [[ -d "dist/${APP_NAME}.app" ]]; then
            echo "MACOS_PACKAGE_PATH=dist/${APP_NAME}.app" >> "$GITHUB_ENV"
            echo "MACOS_BINARY_PATH=dist/${APP_NAME}.app/Contents/MacOS/${APP_NAME}" >> "$GITHUB_ENV"
            echo "MACOS_IS_APP_BUNDLE=1" >> "$GITHUB_ENV"
          elif [[ -x "dist/${APP_NAME}/${APP_NAME}" ]]; then
            echo "MACOS_PACKAGE_PATH=dist/${APP_NAME}" >> "$GITHUB_ENV"
            echo "MACOS_BINARY_PATH=dist/${APP_NAME}/${APP_NAME}" >> "$GITHUB_ENV"
            echo "MACOS_IS_APP_BUNDLE=0" >> "$GITHUB_ENV"
          else
            echo "Expected app output not found."
            ls -R dist || true
            exit 1
          fi

      - name: Developer ID sign and notarize (macOS)
        if: runner.os == 'macOS'
        shell: bash
        env:
          MACOS_CERTIFICATE_P12_BASE64: ${{ secrets.MACOS_CERTIFICATE_P12_BASE64 }}
          MACOS_CERTIFICATE_PASSWORD: ${{ secrets.MACOS_CERTIFICATE_PASSWORD }}
          MACOS_CODESIGN_IDENTITY: ${{ secrets.MACOS_CODESIGN_IDENTITY }}
          MACOS_NOTARY_APPLE_ID: ${{ secrets.MACOS_NOTARY_APPLE_ID }}
          MACOS_NOTARY_TEAM_ID: ${{ secrets.MACOS_NOTARY_TEAM_ID }}
          MACOS_NOTARY_PASSWORD: ${{ secrets.MACOS_NOTARY_PASSWORD }}
        run: |
          if [[ "${MACOS_IS_APP_BUNDLE:-0}" != "1" ]]; then
            echo "Notarization skipped: build output is not an .app bundle."
            exit 0
          fi

          required_vars=(
            "MACOS_CERTIFICATE_P12_BASE64"
            "MACOS_CERTIFICATE_PASSWORD"
            "MACOS_CODESIGN_IDENTITY"
            "MACOS_NOTARY_APPLE_ID"
            "MACOS_NOTARY_TEAM_ID"
            "MACOS_NOTARY_PASSWORD"
          )
          for var_name in "${required_vars[@]}"; do
            if [[ -z "${!var_name:-}" ]]; then
              echo "Notarization skipped: missing GitHub secret ${var_name}."
              exit 0
            fi
          done

          echo "Importing Developer ID certificate..."
          echo "$MACOS_CERTIFICATE_P12_BASE64" | base64 --decode > macos_cert.p12
          security create-keychain -p "" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "" build.keychain
          security import macos_cert.p12 -k build.keychain -P "$MACOS_CERTIFICATE_PASSWORD" -T /usr/bin/codesign -T /usr/bin/security
          security set-key-partition-list -S apple-tool:,apple: -s -k "" build.keychain

          xattr -cr "${MACOS_PACKAGE_PATH}" || true
          while IFS= read -r -d '' file; do
            codesign --force --timestamp --options runtime --sign "$MACOS_CODESIGN_IDENTITY" "${file}"
          done < <(find "${MACOS_PACKAGE_PATH}" -type f \( -perm -111 -o -name "*.dylib" -o -name "*.so" -o -name "Python" \) -print0)

          codesign --force --deep --timestamp --options runtime --sign "$MACOS_CODESIGN_IDENTITY" "${MACOS_PACKAGE_PATH}"
          codesign --verify --deep --strict --verbose=2 "${MACOS_PACKAGE_PATH}"
          spctl --assess --type execute --verbose "${MACOS_PACKAGE_PATH}" || true

          echo "Submitting for notarization..."
          notary_zip="${APP_NAME}-macos-notary.zip"
          ditto -c -k --keepParent "${MACOS_PACKAGE_PATH}" "${notary_zip}"
          xcrun notarytool submit "${notary_zip}" \
            --apple-id "$MACOS_NOTARY_APPLE_ID" \
            --team-id "$MACOS_NOTARY_TEAM_ID" \
            --password "$MACOS_NOTARY_PASSWORD" \
            --wait
          xcrun stapler staple "${MACOS_PACKAGE_PATH}"
          echo "MACOS_NOTARIZED=1" >> "$GITHUB_ENV"

      - name: Ad-hoc codesign (macOS fallback)
        if: runner.os == 'macOS'
        shell: bash
        run: |
          if [[ "${MACOS_NOTARIZED:-0}" == "1" ]]; then
            echo "Skipping fallback codesign: Developer ID notarization already succeeded."
            exit 0
          fi

          echo "Using ad-hoc codesign fallback (Developer ID/notarization not applied)."
          xattr -cr "${MACOS_PACKAGE_PATH}" || true
          while IFS= read -r -d '' file; do
            codesign --force --sign - "${file}"
          done < <(find "${MACOS_PACKAGE_PATH}" -type f \( -perm -111 -o -name "*.dylib" -o -name "*.so" -o -name "Python" \) -print0)

          if [[ "${MACOS_IS_APP_BUNDLE}" == "1" ]]; then
            codesign --force --deep --sign - "${MACOS_PACKAGE_PATH}"
            codesign --verify --deep --strict --verbose=2 "${MACOS_PACKAGE_PATH}"
          else
            codesign --force --deep --sign - "${MACOS_BINARY_PATH}"
            codesign --verify --deep --strict --verbose=2 "${MACOS_BINARY_PATH}"
          fi

      - name: Smoke test packaged app (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          if (Test-Path "dist/$env:APP_NAME/$env:APP_NAME.exe") {
            Write-Host "Packaged app found: dist/$env:APP_NAME/$env:APP_NAME.exe"
          } elseif (Test-Path "dist/$env:APP_NAME.exe") {
            Write-Host "Packaged app found: dist/$env:APP_NAME.exe"
          } else {
            Write-Host "dist content:"
            Get-ChildItem -Recurse dist | Format-Table -AutoSize
            throw "Packaged app binary not found."
          }

      - name: Smoke test packaged app (macOS)
        if: runner.os == 'macOS'
        continue-on-error: true
        shell: bash
        run: |
          set -euo pipefail
          smoke_log="$(mktemp)"
          MOSAICAPP_SELF_TEST=1 "${MACOS_BINARY_PATH}" >"${smoke_log}" 2>&1 &
          smoke_pid=$!
          smoke_exit=0
          smoke_completed=0

          for _ in $(seq 1 120); do
            if ! kill -0 "${smoke_pid}" 2>/dev/null; then
              set +e
              wait "${smoke_pid}"
              smoke_exit=$?
              set -e
              smoke_completed=1
              break
            fi
            sleep 1
          done

          if [[ "${smoke_completed}" -eq 0 ]]; then
            smoke_exit=124
            kill "${smoke_pid}" 2>/dev/null || true
            sleep 2
            kill -9 "${smoke_pid}" 2>/dev/null || true
          fi

          cat "${smoke_log}"

          if [[ ${smoke_exit} -ne 0 && ${smoke_exit} -ne 124 ]]; then
            echo "Smoke test exited with code ${smoke_exit}."
            exit ${smoke_exit}
          fi

          if grep -E "Error importing core app modules|No module named|MOSAICAPP_SELF_TEST_FAIL" "${smoke_log}" >/dev/null; then
            echo "Detected import/runtime errors in packaged app output."
            exit 1
          fi

          if [[ ${smoke_exit} -eq 124 ]]; then
            echo "Smoke test timed out after 120s (expected for GUI/server-style apps)."
          fi

      - name: Set archive name
        shell: bash
        run: |
          version="${GITHUB_REF_NAME:-manual-${GITHUB_RUN_NUMBER}}"
          version="${version//\//-}"
          echo "ARCHIVE_NAME=${APP_NAME}-${version}-${{ matrix.artifact_suffix }}.zip" >> "$GITHUB_ENV"

      - name: Make zip (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          if (Test-Path "dist/$env:APP_NAME") {
            tar -a -c -f "$env:ARCHIVE_NAME" -C "dist" "$env:APP_NAME"
          } elseif (Test-Path "dist/$env:APP_NAME.exe") {
            tar -a -c -f "$env:ARCHIVE_NAME" -C "dist" "$env:APP_NAME.exe"
          } else {
            Write-Host "dist content:"
            Get-ChildItem -Recurse dist | Format-Table -AutoSize
            throw "Build output not found."
          }
          if (!(Test-Path "$env:ARCHIVE_NAME")) {
            throw "Archive was not created: $env:ARCHIVE_NAME"
          }

      - name: Make zip (macOS)
        if: runner.os == 'macOS'
        run: |
          ditto -c -k --sequesterRsrc --keepParent "${MACOS_PACKAGE_PATH}" "${ARCHIVE_NAME}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.APP_NAME }}-${{ matrix.artifact_suffix }}
          path: ${{ env.ARCHIVE_NAME }}
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: write
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Publish release assets
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*.zip
          generate_release_notes: true
