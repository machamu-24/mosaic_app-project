name: build-desktop

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest]

    runs-on: ${{ matrix.os }}

    env:
      APP_NAME: MosaicApp
      PYTHON_VERSION: "3.11"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements_build.txt

      - name: Build desktop app (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          streamlit-desktop-app build app.py --name $env:APP_NAME `
            --streamlit-options --theme.base=dark `
            --pyinstaller-options --noconfirm --onedir --add-data "models;models"

      - name: Build desktop app (macOS)
        if: runner.os == 'macOS'
        run: |
          streamlit-desktop-app build app.py --name "${APP_NAME}" \
            --streamlit-options --theme.base=dark \
            --pyinstaller-options --noconfirm --onedir --add-data "models:models"

      - name: Make zip (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Compress-Archive -Path "dist/${env:APP_NAME}/*" -DestinationPath "${env:APP_NAME}-windows.zip"

      - name: Make zip (macOS)
        if: runner.os == 'macOS'
        run: |
          ditto -c -k --sequesterRsrc --keepParent "dist/${APP_NAME}" "${APP_NAME}-macos.zip"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.APP_NAME }}-${{ runner.os }}
          path: |
            *.zip
