name: build-desktop

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  build:
    name: Build (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            artifact_suffix: windows-x64
          - os: macos-latest
            artifact_suffix: macos

    runs-on: ${{ matrix.os }}

    env:
      APP_NAME: MosaicApp
      PYTHON_VERSION: "3.11"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements_build.txt

      - name: Build desktop app (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          streamlit-desktop-app build app.py --name $env:APP_NAME `
            --streamlit-options --theme.base=dark `
            --pyinstaller-options --noconfirm --onedir --add-data "models;models" --add-data "run_mosaic.py;."

      - name: Build desktop app (macOS)
        if: runner.os == 'macOS'
        run: |
          streamlit-desktop-app build app.py --name "${APP_NAME}" \
            --streamlit-options --theme.base=dark \
            --pyinstaller-options --noconfirm --onedir --add-data "models:models" --add-data "run_mosaic.py:."

      - name: Ad-hoc codesign (macOS)
        if: runner.os == 'macOS'
        shell: bash
        run: |
          app_dir="dist/${APP_NAME}"
          app_bin="${app_dir}/${APP_NAME}"
          if [[ ! -f "${app_bin}" ]]; then
            echo "Expected app binary not found: ${app_bin}"
            ls -R dist || true
            exit 1
          fi

          # Re-sign bundled binaries to avoid macOS library-load policy errors.
          xattr -cr "${app_dir}" || true
          while IFS= read -r -d '' file; do
            codesign --force --sign - "${file}"
          done < <(find "${app_dir}" -type f \( -perm -111 -o -name "*.dylib" -o -name "*.so" -o -name "Python" \) -print0)

          codesign --force --deep --sign - "${app_bin}"
          codesign --verify --deep --strict --verbose=2 "${app_bin}"

      - name: Set archive name
        shell: bash
        run: |
          version="${GITHUB_REF_NAME:-manual-${GITHUB_RUN_NUMBER}}"
          version="${version//\//-}"
          echo "ARCHIVE_NAME=${APP_NAME}-${version}-${{ matrix.artifact_suffix }}.zip" >> "$GITHUB_ENV"

      - name: Make zip (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          if (Test-Path "dist/$env:APP_NAME") {
            Compress-Archive -Path "dist/$env:APP_NAME/*" -DestinationPath "$env:ARCHIVE_NAME"
          } elseif (Test-Path "dist/$env:APP_NAME.exe") {
            Compress-Archive -Path "dist/$env:APP_NAME.exe" -DestinationPath "$env:ARCHIVE_NAME"
          } else {
            Write-Host "dist content:"
            Get-ChildItem -Recurse dist | Format-Table -AutoSize
            throw "Build output not found."
          }

      - name: Make zip (macOS)
        if: runner.os == 'macOS'
        run: |
          if [[ -d "dist/${APP_NAME}.app" ]]; then
            ditto -c -k --sequesterRsrc --keepParent "dist/${APP_NAME}.app" "${ARCHIVE_NAME}"
          elif [[ -d "dist/${APP_NAME}" ]]; then
            ditto -c -k --sequesterRsrc --keepParent "dist/${APP_NAME}" "${ARCHIVE_NAME}"
          else
            echo "dist content:"
            ls -R dist || true
            exit 1
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.APP_NAME }}-${{ matrix.artifact_suffix }}
          path: ${{ env.ARCHIVE_NAME }}
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: write
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Publish release assets
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*.zip
          generate_release_notes: true
